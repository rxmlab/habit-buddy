services:
  - type: web
    name: habit-buddy
    env: python
    buildCommand: "./build.sh"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PROD_MODE
        value: "true"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: habit-buddy-db
          property: connectionString

databases:
  - name: habit-buddy-db
    databaseName: habitbuddy
    user: habitbuddy
