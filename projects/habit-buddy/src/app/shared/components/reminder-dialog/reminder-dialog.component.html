<!-- Modal Container -->
<div 
  *ngIf="isOpen()" 
  class="reminder-dialog-backdrop"
  (click)="onClose()">
  
  <!-- Dialog -->
  <div 
    class="reminder-dialog"
    (click)="$event.stopPropagation()">
  
  <!-- Header -->
  <div class="dialog-header">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-gradient-to-r from-blue-500 to-indigo-600 flex items-center justify-center">
        <lucide-icon [img]="BellIcon" size="20" class="text-white"></lucide-icon>
      </div>
      <div>
        <h3 class="text-lg font-semibold text-slate-800">Time for your habit!</h3>
        <p class="text-sm text-slate-600">{{ formatTime(reminder?.time || '') }}</p>
      </div>
    </div>
    <button 
      (click)="onClose()"
      class="p-2 hover:bg-slate-100 rounded-lg transition-colors">
      <lucide-icon [img]="XIcon" size="18" class="text-slate-500"></lucide-icon>
    </button>
  </div>

  <!-- Content -->
  <div class="dialog-content" *ngIf="habit && reminder">
    <!-- Habit Card -->
    <div class="habit-card">
      <div class="flex items-center gap-4 p-4 bg-gradient-to-r from-blue-50 to-indigo-50 rounded-xl border border-blue-200">
        <div 
          class="w-14 h-14 rounded-full flex items-center justify-center text-white font-bold text-xl shadow-lg"
          [style.background-color]="habit.color">
          {{ habit.title.charAt(0).toUpperCase() }}
        </div>
        <div class="flex-1">
          <h4 class="text-xl font-bold text-slate-800 mb-1">{{ habit.title }}</h4>
          <p class="text-sm text-slate-600">Complete this habit to maintain your streak!</p>
        </div>
      </div>
    </div>

    <!-- Quick Info -->
    <div class="quick-info">
      <div class="flex items-center justify-between p-3 bg-slate-50 rounded-lg">
        <div class="flex items-center gap-2">
          <lucide-icon [img]="CheckCircleIcon" size="16" class="text-green-600"></lucide-icon>
          <span class="text-sm font-medium text-slate-700">Scheduled for:</span>
        </div>
        <span class="text-sm font-semibold text-slate-800">{{ getDaysText(reminder.days) }}</span>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="dialog-actions">
    <button 
      (click)="onSnooze()"
      class="snooze-btn">
      <lucide-icon [img]="ClockIcon" size="18"></lucide-icon>
      Snooze 5 min
    </button>
    <button 
      (click)="onMarkAsDone()"
      class="primary-btn">
      <lucide-icon [img]="CheckCircleIcon" size="18"></lucide-icon>
      Mark as Done
    </button>
  </div>
  
  </div> <!-- Close dialog -->
</div> <!-- Close backdrop -->
