@if (isAuthenticated()) {
<div class="h-screen flex flex-col md:flex-row">
  <!-- Sidebar (desktop only) -->
  <app-sidebar class="hidden md:flex md:flex-col w-72 md:h-full" />
  
  <!-- Main content -->
  <main class="flex-1 p-4 md:p-6 overflow-y-auto md:h-full pb-24 md:pb-6">
    <!-- Header (mobile) -->
    <app-header class="md:hidden mb-4" />
    
    <router-outlet />
  </main>
</div>

<!-- Bottom nav (mobile) -->
<app-bottom-nav class="md:hidden fixed left-0 right-0 bottom-0" />

<!-- Modals area -->
<div id="modals"></div>

<!-- Audio for notifications -->
<audio id="ding" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg"></audio>

<!-- Global Help Button (desktop and mobile) -->
<app-global-help />

<!-- PWA Install Prompt -->
<app-pwa-prompt></app-pwa-prompt>

<!-- Global Dialog -->
<app-dialog
  [isOpen]="dialogService.isOpen()"
  [title]="dialogService.config().title"
  [message]="dialogService.config().message"
  [type]="dialogService.config().type"
  [buttons]="dialogService.config().buttons || []"
  (close)="dialogService.close()"
  (buttonClick)="onGlobalDialogAction($event)">
</app-dialog>

<!-- Reminder Dialog -->
<app-reminder-dialog
  [isOpen]="notificationService.showReminderDialog"
  [habit]="notificationService.currentReminderHabit()"
  [reminder]="notificationService.currentReminder()"
  (close)="onReminderDialogClose()"
  (markAsDone)="onMarkHabitAsDone($event)"
  (snooze)="onSnoozeReminder($event)">
</app-reminder-dialog>
} @else {
  <!-- For unauthenticated users, just show the router outlet directly (e.g. login page) -->
  <router-outlet />
}
