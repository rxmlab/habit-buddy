<header class="mobile-header">
  <div class="brand-section">
    <div class="logo-container">
      <img 
        src="./logo/logo.svg" 
        alt="HabitBuddy" 
        class="brand-logo"
        onerror="this.src='./logo/habitbuddy_vector_64.png'"
      />
    </div>
    <div class="brand-info">
      <h1 class="brand-title">HabitBuddy</h1>
      <p class="brand-tagline">Build Better Habits</p>
    </div>
  </div>
  <div class="header-actions">
    <button 
      (click)="logout()"
      class="logout-btn"
      title="Logout">
      <lucide-icon [img]="LogOutIcon" size="20"></lucide-icon>
    </button>
  </div>
</header>
