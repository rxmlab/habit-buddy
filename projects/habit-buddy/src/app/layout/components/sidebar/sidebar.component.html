<aside class="bg-white border-r p-4 flex flex-col">
  <div class="sidebar-branding">
    <div class="brand-section">
      <div class="logo-container">
        <img
          src="./logo/logo.svg"
          alt="HabitBuddy"
          class="brand-logo"
          onerror="this.src='./logo/habitbuddy_vector_64.png'"
        />
      </div>
      <div class="brand-info">
        <h1 class="brand-title">HabitBuddy</h1>
        <p class="brand-tagline">Build Better Habits</p>
      </div>
    </div>
    <div class="brand-features">Reminders • Anti-cheat • Cross-device ready</div>
  </div>

  <!-- User Profile Card -->
  @if (user()) {
  <div class="mb-4 p-3 bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 rounded-xl border border-indigo-100 shadow-sm">
    <div class="flex items-start gap-3">
      <!-- Avatar with gradient -->
      <div class="w-12 h-12 rounded-full bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center text-white font-bold text-lg shrink-0 shadow-md">
        {{ getUserInitials() }}
      </div>
      
      <!-- User Info -->
      <div class="flex-1 min-w-0">
        <h3 class="font-semibold text-gray-900 truncate text-sm">
          {{ user()?.displayName || 'User' }}
        </h3>
        <div class="text-xs text-gray-600 truncate flex items-center gap-1 mt-0.5">
          <span class="truncate">{{ user()?.email }}</span>
        </div>
      </div>
    </div>
  </div>
  }

  <nav class="flex-1 flex flex-col space-y-2">
    <a
      routerLink="/goals"
      routerLinkActive="bg-slate-100"
      class="nav-btn w-full text-left px-3 py-2 rounded hover:bg-slate-100 flex items-center gap-2"
    >
      <lucide-icon [img]="HomeIcon" size="16"></lucide-icon>
      Goals
    </a>
    <a
      routerLink="/calendar"
      routerLinkActive="bg-slate-100"
      class="nav-btn w-full text-left px-3 py-2 rounded hover:bg-slate-100 flex items-center gap-2"
    >
      <lucide-icon [img]="CalendarIcon" size="16"></lucide-icon>
      Calendar
    </a>
    <a
      routerLink="/stats"
      routerLinkActive="bg-slate-100"
      class="nav-btn w-full text-left px-3 py-2 rounded hover:bg-slate-100 flex items-center gap-2"
    >
      <lucide-icon [img]="BarChart3Icon" size="16"></lucide-icon>
      Statistics
    </a>
    <!-- <a
      routerLink="/reminders"
      routerLinkActive="bg-slate-100"
      class="nav-btn w-full text-left px-3 py-2 rounded hover:bg-slate-100 flex items-center gap-2"
    >
      <lucide-icon [img]="ClockIcon" size="16"></lucide-icon>
      Reminders
    </a> -->
    <a
      routerLink="/settings"
      routerLinkActive="bg-slate-100"
      class="nav-btn w-full text-left px-3 py-2 rounded hover:bg-slate-100 flex items-center gap-2"
    >
      <lucide-icon [img]="SettingsIcon" size="16"></lucide-icon>
      Settings
    </a>
    
    @if (user()?.isAdmin) {
    <div class="pt-2 mt-2 border-t border-slate-200">
      <a
        routerLink="/admin"
        routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
        class="nav-btn w-full text-left px-3 py-2 rounded hover:bg-indigo-50 hover:text-indigo-700 flex items-center gap-2 text-slate-600 transition-colors"
      >
        <lucide-icon [img]="ShieldIcon" size="16"></lucide-icon>
        Admin Dashboard
      </a>
    </div>
    }
  </nav>

  <!-- Logout section -->
  @if (isAuthenticated()) {
  <div class="mt-auto pt-4 border-t border-slate-200">
    <button
      (click)="logout()"
      class="w-full text-left px-3 py-2 rounded hover:bg-red-50 text-red-600 hover:text-red-700 flex items-center gap-2 transition-colors"
    >
      <lucide-icon [img]="LogOutIcon" size="16"></lucide-icon>
      Logout
    </button>
  </div>
  }
</aside>
