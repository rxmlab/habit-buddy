<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-container">
        <img 
          src="./logo/logo.svg" 
          alt="HabitBuddy" 
          class="brand-logo"
          onerror="this.src='./logo/habitbuddy_vector_64.png'"
        />
      </div>
      <h1 class="auth-title">{{ isSignUp ? 'Create Account' : 'Welcome Back' }}</h1>
      <p class="auth-subtitle">
        {{ isSignUp ? 'Start building better habits today' : 'Sign in to continue your journey' }}
      </p>
    </div>

    <form [formGroup]="authForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <div class="input-container">
          <lucide-icon [img]="MailIcon" size="20" class="input-icon"></lucide-icon>
          <input
            id="email"
            type="email"
            formControlName="email"
            class="form-input"
            placeholder="Enter your email"
            [class.error]="getFieldError('email')"
          />
        </div>
        <div class="error-message" *ngIf="getFieldError('email')">
          {{ getFieldError('email') }}
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <div class="input-container">
          <lucide-icon [img]="LockIcon" size="20" class="input-icon"></lucide-icon>
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            class="form-input"
            placeholder="Enter your password"
            [class.error]="getFieldError('password')"
          />
          <button
            type="button"
            class="password-toggle"
            (click)="togglePasswordVisibility()"
          >
            <lucide-icon [img]="showPassword ? EyeOffIcon : EyeIcon" size="20"></lucide-icon>
          </button>
        </div>
        <div class="error-message" *ngIf="getFieldError('password')">
          {{ getFieldError('password') }}
        </div>
      </div>

      <div class="error-message auth-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        class="auth-button primary"
        [disabled]="authForm.invalid || isLoading"
      >
        <lucide-icon 
          [img]="isSignUp ? UserPlusIcon : LogInIcon" 
          size="20"
          *ngIf="!isLoading"
        ></lucide-icon>
        <span *ngIf="isLoading">Please wait...</span>
        <span *ngIf="!isLoading">{{ isSignUp ? 'Create Account' : 'Sign In' }}</span>
      </button>



      <div class="auth-footer">
        <p>
          {{ isSignUp ? 'Already have an account?' : "Don't have an account?" }}
          <button
            type="button"
            class="link-button"
            (click)="toggleSignUp()"
            [disabled]="isLoading"
          >
            {{ isSignUp ? 'Sign In' : 'Sign Up' }}
          </button>
        </p>
      </div>
    </form>
  </div>
</div>
